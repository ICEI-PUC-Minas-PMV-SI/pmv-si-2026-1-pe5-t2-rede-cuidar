{% extends 'base.html' %}
{% block content %}

<div class="card">
  <div class="card-header">
    <h1>Novo Paciente</h1>
    <a href="/" class="btn btn-ghost">← Voltar</a>
  </div>

  <form method="POST" action="/cadastrar">
    <div class="form-group">
      <label for="nome">Nome Completo</label>
      <input type="text" id="nome" name="nome" placeholder="Ex: João da Silva" required>
    </div>
    <div class="form-group">
      <label for="cpf">CPF</label>
      <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required>
    </div>
    <div class="form-group">
      <label for="nascimento">Data de Nascimento</label>
      <input type="date" id="nascimento" name="nascimento" required>
    </div>
    <div class="form-group">
      <label for="unidade">Unidade de Atendimento</label>
      <select id="unidade" name="unidade" required>
        <option value="" disabled selected>Selecione a unidade</option>
        <option value="Matriz - BH">Matriz - BH</option>
        <option value="Secretaria">Secretaria</option>
        <option value="UPA 1">UPA 1</option>
        <option value="UPA 2">UPA 2</option>
        <option value="UPA 3">UPA 3</option>
      </select>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-success">✔ Cadastrar Paciente</button>
      <a href="/" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>

{% endblock %}
